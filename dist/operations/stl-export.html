  <body class="og-example-page">
    <div class="og-badge-title-card">
      <a href="../index.html" class="og-badge-title-link">Back</a>
      <span class="og-badge-title">STL Export</span>
    </div>

    <aside class="og-controls" data-control-panel>
      <h3>STL Export</h3>
      <p class="og-control-summary">
        Pick a shape, tune parameters, and export a binary STL. Current shape details and export
        reports are logged to the console.
      </p>

      <label class="og-control-row" data-control-key="shape" data-control-type="select">
        <div class="og-control-header">
          <span class="og-control-label-chip">Shape</span>
        </div>
        <select class="og-control-select" data-control-select aria-label="Shape">
          <option value="cuboid" selected>Cuboid</option>
          <option value="cylinder">Cylinder</option>
          <option value="sphere">Sphere</option>
          <option value="wedge">Wedge</option>
        </select>
      </label>

      <div class="og-control-group" data-shape-group="cuboid">
        <label class="og-control-row" data-control-key="cuboidWidth" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Width</span>
            <code class="og-control-value" data-control-value>1.8</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="0.2" max="4" step="0.05" value="1.8" />
            <input data-control-number type="number" min="0.2" max="4" step="0.05" value="1.8" />
          </div>
        </label>
        <label class="og-control-row" data-control-key="cuboidHeight" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Height</span>
            <code class="og-control-value" data-control-value>1.4</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="0.2" max="4" step="0.05" value="1.4" />
            <input data-control-number type="number" min="0.2" max="4" step="0.05" value="1.4" />
          </div>
        </label>
        <label class="og-control-row" data-control-key="cuboidDepth" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Depth</span>
            <code class="og-control-value" data-control-value>1.1</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="0.2" max="4" step="0.05" value="1.1" />
            <input data-control-number type="number" min="0.2" max="4" step="0.05" value="1.1" />
          </div>
        </label>
      </div>

      <div class="og-control-group" data-shape-group="cylinder" hidden>
        <label class="og-control-row" data-control-key="cylinderRadius" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Radius</span>
            <code class="og-control-value" data-control-value>0.8</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="0.2" max="3" step="0.05" value="0.8" />
            <input data-control-number type="number" min="0.2" max="3" step="0.05" value="0.8" />
          </div>
        </label>
        <label class="og-control-row" data-control-key="cylinderHeight" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Height</span>
            <code class="og-control-value" data-control-value>1.8</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="0.2" max="4" step="0.05" value="1.8" />
            <input data-control-number type="number" min="0.2" max="4" step="0.05" value="1.8" />
          </div>
        </label>
        <label
          class="og-control-row"
          data-control-key="cylinderSegments"
          data-control-type="number"
        >
          <div class="og-control-header">
            <span class="og-control-label-chip">Segments</span>
            <code class="og-control-value" data-control-value>36</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="6" max="96" step="1" value="36" />
            <input data-control-number type="number" min="6" max="96" step="1" value="36" />
          </div>
        </label>
        <label
          class="og-control-row"
          data-control-key="cylinderAngleDeg"
          data-control-type="number"
        >
          <div class="og-control-header">
            <span class="og-control-label-chip">Angle (deg)</span>
            <code class="og-control-value" data-control-value>360</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="20" max="360" step="1" value="360" />
            <input data-control-number type="number" min="20" max="360" step="1" value="360" />
          </div>
        </label>
      </div>

      <div class="og-control-group" data-shape-group="sphere" hidden>
        <label class="og-control-row" data-control-key="sphereRadius" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Radius</span>
            <code class="og-control-value" data-control-value>1</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="0.2" max="3" step="0.05" value="1" />
            <input data-control-number type="number" min="0.2" max="3" step="0.05" value="1" />
          </div>
        </label>
        <label
          class="og-control-row"
          data-control-key="sphereWidthSegments"
          data-control-type="number"
        >
          <div class="og-control-header">
            <span class="og-control-label-chip">Width Segments</span>
            <code class="og-control-value" data-control-value>32</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="3" max="96" step="1" value="32" />
            <input data-control-number type="number" min="3" max="96" step="1" value="32" />
          </div>
        </label>
        <label
          class="og-control-row"
          data-control-key="sphereHeightSegments"
          data-control-type="number"
        >
          <div class="og-control-header">
            <span class="og-control-label-chip">Height Segments</span>
            <code class="og-control-value" data-control-value>20</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="2" max="64" step="1" value="20" />
            <input data-control-number type="number" min="2" max="64" step="1" value="20" />
          </div>
        </label>
      </div>

      <div class="og-control-group" data-shape-group="wedge" hidden>
        <label class="og-control-row" data-control-key="wedgeWidth" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Width</span>
            <code class="og-control-value" data-control-value>2</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="0.2" max="4" step="0.05" value="2" />
            <input data-control-number type="number" min="0.2" max="4" step="0.05" value="2" />
          </div>
        </label>
        <label class="og-control-row" data-control-key="wedgeHeight" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Height</span>
            <code class="og-control-value" data-control-value>1.8</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="0.2" max="4" step="0.05" value="1.8" />
            <input data-control-number type="number" min="0.2" max="4" step="0.05" value="1.8" />
          </div>
        </label>
        <label class="og-control-row" data-control-key="wedgeDepth" data-control-type="number">
          <div class="og-control-header">
            <span class="og-control-label-chip">Depth</span>
            <code class="og-control-value" data-control-value>1.4</code>
          </div>
          <div class="og-control-range">
            <input data-control-range type="range" min="0.2" max="4" step="0.05" value="1.4" />
            <input data-control-number type="number" min="0.2" max="4" step="0.05" value="1.4" />
          </div>
        </label>
      </div>

      <label class="og-control-row" data-control-key="outline" data-control-type="boolean">
        <div class="og-control-header">
          <span class="og-control-label-chip">Outline</span>
        </div>
        <div class="og-control-bool">
          <input data-control-toggle type="checkbox" class="og-toggle" aria-label="Outline" checked />
          <span class="og-control-bool-state" data-control-bool-state>Enabled</span>
        </div>
      </label>

      <button type="button" class="og-control-action og-control-action-cyan" data-action="export-stl">
        Export Binary STL
      </button>
      <a data-download-link hidden></a>
    </aside>

    <div id="app"></div>

  </body>
</html>
